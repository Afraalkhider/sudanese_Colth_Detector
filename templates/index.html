<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Clothing Detector</title>
    <style>
        /* Color Palette & Global Settings */
        :root {
            --primary-color: #2C3E50;
            --accent-color: #3498DB;
            --background-color: #F4F7F6;
            --card-bg: #FFFFFF;
            --text-main: #333333;
            --text-muted: #7F8C8D;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--background-color);
            color: var(--text-main);
            display: flex;
            flex-direction: column;
            align-items: center;
            margin: 0;
            padding: 50px 20px;
        }

        /* Main Container Styling */
        .container {
            background: var(--card-bg);
            padding: 40px;
            border-radius: 12px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.08);
            max-width: 600px;
            width: 100%;
            text-align: center;
        }

        h1 {
            font-size: 28px;
            color: var(--primary-color);
            margin-bottom: 10px;
        }

        p.subtitle {
            color: var(--text-muted);
            font-size: 15px;
            margin-bottom: 30px;
        }

        /* Upload Form Styling */
        .upload-form {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 20px;
        }

        input[type="file"] {
            padding: 12px;
            background-color: #F8F9FA;
            border: 2px dashed #BDC3C7;
            border-radius: 8px;
            width: 80%;
            cursor: pointer;
            transition: border-color 0.3s ease;
        }

        input[type="file"]:hover {
            border-color: var(--accent-color);
        }

        button {
            background-color: var(--accent-color);
            color: white;
            border: none;
            padding: 12px 35px;
            font-size: 16px;
            font-weight: 600;
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: 0 4px 15px rgba(52, 152, 219, 0.3);
        }

        button:hover {
            background-color: #2980B9;
            transform: translateY(-2px);
        }

        /* Results Section Styling */
        .result-box {
            margin-top: 40px;
            padding-top: 30px;
            border-top: 1px solid #EEEEEE;
        }

        .result-box h3 {
            color: var(--primary-color);
            margin-bottom: 20px;
        }

        .result-box img {
            max-width: 100%;
            border-radius: 8px;
            box-shadow: 0 5px 20px rgba(0, 0, 0, 0.15);
            margin-bottom: 20px;
        }

        .results-list {
            list-style: none;
            padding: 0;
            margin: 0;
        }

        .results-list li {
            background: #F8F9FA;
            margin: 10px 0;
            padding: 15px;
            border-radius: 8px;
            font-weight: 500;
            color: var(--primary-color);
            border-left: 5px solid var(--accent-color);
            text-align: left;
        }
    </style>
</head>
<body>

    <div class="container">
        <h1>Sudanese Clothing Detector</h1>
        <p class="subtitle">Upload an image to detect traditional garments instantly.</p>
        
        <!-- Upload Form -->
        <form class="upload-form" method="POST" enctype="multipart/form-data">
            <input type="file" name="image" accept="image/*" required>
            <button type="submit">Analyze Image</button>
        </form>

        <!-- Results Display -->
        {% if image_url %}
        <div class="result-box">
            <h3>Analysis Results</h3>
            <img src="{{ image_url }}" alt="Processed Image">
            <ul class="results-list">
                {% for item in items %}
                    <li>{{ item }}</li>
                {% endfor %}
            </ul>
        </div>
        {% endif %}
    </div>

</body>
</html>
