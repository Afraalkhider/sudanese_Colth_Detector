<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>Sudenese Traditional Detection</title>
    <style>
        body { font-family: Arial; text-align: center; margin: 40px; background-color: #f4f4f9; }
        .result-box { margin-top: 30px; border: 2px solid #333; padding: 20px; border-radius: 10px; display: inline-block; background: white; }
        img { max-width: 500px; border-radius: 10px; margin-bottom: 15px; }
        ul { list-style-type: none; padding: 0; font-size: 18px; font-weight: bold; }
        li { color: #2c3e50; margin: 5px 0; }
        .health { color: #27ae60; }
    </style>
</head>
<body>
    <h1>Analizing.. 🇸🇩</h1>
    
    <!-- images upload -->
    <form method="POST" enctype="multipart/form-data">
        <input type="file" name="image" accept="image/*" required>
        <button type="submit" style="padding: 10px 20px; cursor: pointer;">images analysis</button>
    </form>

    <!-- Show results if available -->
    {% if image_url %}
    <div class="result-box">
        <h3>Result:</h3>
        <img src="{{ image_url }}" alt="Image after analysis">
        <ul>
            {% for item in items %}
                <li>{{ item }}</li>
            {% endfor %}
        </ul>
    </div>
    {% endif %}
</body>
</html>
